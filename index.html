    <!-- Schema.org — FAQPage -->

        {
          "@type": "Question",
          "name": "Je n'ai jamais fait de sport, c'est pour moi ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolument. La majorité de nos membres n'étaient pas sportifs en arrivant. Chaque mouvement est adapté à ton niveau par un coach certifié CrossFit. Tu progresses à ton rythme."
          }
        },
        {
          "@type": "Question",
          "name": "Le CrossFit, c'est pas trop violent / intense ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. L'intensité est relative et toujours contrôlée par un coach certifié. C'est toi qui décides de ton effort. Le coach est là pour t'accompagner, pas pour te pousser au-delà de tes limites."
          }
        },
        {
          "@type": "Question",
          "name": "Comment se passe la première séance chez CrossFit Genki à Talange ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tu réserves en ligne en 2 clics, tu viens 10 min avant, on t'accueille et on te briefe. Le coach adapte l'entraînement du jour à ton niveau. Tu repars avec le sourire."
          }
        },
        {
          "@type": "Question",
          "name": "C'est quoi HYROX ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HYROX est un format de compétition fitness qui mélange course à pied et exercices fonctionnels. Chez CrossFit Genki à Talange, on propose de vrais cours spécifiques HYROX avec des thèmes d'entraînement créés par Aerox. Plus de 50 personnes déjà préparées."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les horaires de CrossFit Genki ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lundi à jeudi : 9h-10h, 12h-14h, 16h30-20h30. Vendredi : 12h-14h, 16h30-20h30. Samedi : 9h-12h. Dimanche : fermé (ouverture prochaine). La salle est située au Pôle d'activité de Talange Nord, 57525 Talange."
          }
        },
        {
          "@type": "Question",
          "name": "Il faut un engagement minimum pour s'inscrire au CrossFit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Toutes nos offres sont sans engagement. Tu peux commencer par une séance d'essai gratuite, puis choisir la formule qui te convient. Pas de contrat long, pas de piège."
          }
        },
        {
          "@type": "Question",
          "name": "Où est la salle CrossFit Genki exactement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pôle d'activité de Talange Nord, 57525 Talange, à côté de XL Enseigne. Facile d'accès en voiture depuis Metz (12 min) et Thionville (15 min). Parking gratuit."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte l'abonnement CrossFit Genki ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "À partir de 55€/mois pour 5 séances. Le Full Access (le plus populaire) est à 95€/mois pour jusqu'à 5 séances par semaine. Offres étudiants et forces de l'ordre disponibles. Toutes les offres sont sans engagement."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que CrossFit Genki est une salle affiliée CrossFit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. CrossFit Genki est officiellement affiliée à CrossFit depuis 2024. Nos coachs sont certifiés CrossFit (Level 1, Level 2). C'est un gage de qualité et de méthodologie certifiée."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qui différencie CrossFit Genki des autres salles de CrossFit à Metz et Thionville ?",

            "@type": "Answer",
